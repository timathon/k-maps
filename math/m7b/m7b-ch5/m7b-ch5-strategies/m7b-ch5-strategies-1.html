    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');

        body {

            transition: all 0.2s;

        .correct-ans {
            background-color: #d1fae5 !important;
            border-color: #10b981 !important;
            color: #065f46 !important;
        }

        .wrong-ans {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
        }

        /* MathJax Mobile Responsiveness */
        #explanation-content mjx-container,
        #question-area mjx-container {
            display: inline-block !important;
            max-width: 100% !important;
            overflow-x: auto !important;
            overflow-y: hidden !important;
            vertical-align: middle;
            -webkit-overflow-scrolling: touch;
        }

        #explanation-content mjx-container[display="true"],
        #question-area mjx-container[display="true"] {
            display: block !important;
            max-width: 100% !important;
            overflow-x: auto !important;
            overflow-y: hidden !important;
        }

        @media (max-width: 600px) {
            #explanation-content mjx-container,
            #question-area mjx-container {
                font-size: 88% !important;
            }
        }
    </style>
</head>

<body class="min-h-screen py-8 px-4 sm:px-6 lg:px-8">

    <div class="max-w-3xl mx-auto space-y-8">

        <!-- Header -->
        <div class="text-center space-y-2 relative">
            <a href="../../../../../index.html" class="absolute -top-10 left-0 md:top-0 md:left-4 flex items-center justify-center w-10 h-10 rounded-full bg-white shadow-sm border border-gray-200 text-lg opacity-50 hover:opacity-100 hover:bg-gray-50 hover:shadow transition-all hover:scale-105" title="返回首页">
                🏠
            </a>
            <h1 class="text-3xl font-bold text-gray-900">几何压轴题：等腰三角形设元法与分类讨论</h1>
            <p class="text-gray-500">与其盲目动笔，不如先来梳理思维路径</p>
        </div>

        <!-- Problem Container -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="bg-blue-50 px-6 py-4 border-b border-blue-100 flex justify-between items-center">
                <h2 class="text-lg font-semibold text-blue-800">原题呈现</h2>
                <span class="px-2 py-1 bg-blue-200 text-blue-800 text-xs rounded-full font-medium">难度：★★★★☆</span>
            </div>
            <div class="p-6 md:flex gap-8 items-center">
                <div class="flex-1 space-y-4 text-gray-700 leading-relaxed text-sm md:text-lg">
                    <p>15. 如图，在 $\triangle ABC$ 中，$AB = AC$，点 $D$ 是边 $AB$ 上一点，$\angle BCD = \angle A$。过点 $B$ 作 $BE \perp
                        AC$，垂足为点 $E$，$BE$ 与 $CD$ 相交于点 $F$。</p>
                    <p class="font-medium text-gray-900">(1) 试说明：$\angle BCD = 2\angle CBE$.</p>
                    <p class="font-medium text-gray-900">(2) 若 $\triangle BDF$ 是等腰三角形，请你直接写出 $\angle A$ 的度数。</p>
                </div>
                <!-- Standardized SVG representation of the math diagram -->
                <div class="w-48 h-48 flex-shrink-0 mx-auto mt-6 md:mt-0 relative">
                    <svg viewBox="0 0 200 200" class="w-full h-full stroke-gray-800 fill-none" stroke-width="1.5">
                        <!-- Triangle ABC -->
                        <polygon points="100,20 20,170 180,170" />
                        <!-- Line BE perfectly perpendicular to AC -->
                        <line x1="20" y1="170" x2="144.57" y2="103.56" />
                        <!-- Line CD -->
                        <line x1="180" y1="170" x2="60" y2="95" />

                        <!-- Precise right angle square at E -->
                        <polyline points="139.86,94.74 131.04,99.45 135.75,108.27" stroke-width="1" />

                        <!-- Labels -->
                        <text x="96" y="14" class="fill-gray-800 stroke-none text-xs font-serif italic">A</text>
                        <text x="5" y="176" class="fill-gray-800 stroke-none text-xs font-serif italic">B</text>
                        <text x="184" y="176" class="fill-gray-800 stroke-none text-xs font-serif italic">C</text>
                        <text x="45" y="92" class="fill-gray-800 stroke-none text-xs font-serif italic">D</text>
                        <text x="148" y="100" class="fill-gray-800 stroke-none text-xs font-serif italic">E</text>
                        <text x="100" y="140" class="fill-gray-800 stroke-none text-xs font-serif italic">F</text>
                    </svg>
                </div>
            </div>
        </div>

        <!-- Strategy Quiz Container -->
        <div id="quiz-container"
            class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden relative min-h-[400px]">

            <!-- Progress Bar -->
            <div class="w-full bg-gray-100 h-1.5">
                <div id="progress-bar" class="bg-blue-600 h-1.5 transition-all duration-500" style="width: 16%;"></div>
            </div>

            <div class="p-6 md:p-8" id="question-area">
                <!-- Content will be injected here via JS -->
            </div>
        </div>

    </div>

    <script>
        const quizData = [
            {
                step: "第一步：全局感知，确立破题大方向",
                question: "仔细观察题目条件，题目中给出了“$AB=AC$”、“$\\angle BCD = \\angle A$”等条件和角度关系，但没有任何一个角的具体度数。面对这种“只知关系，不知大小”的几何综合题，初中阶段最高效的破题策略是什么？",
                options: [
                    { text: "纯几何逻辑推理，拼命在图中寻找全等三角形。", isCorrect: false },
                    { text: "大胆假设，自己随便给 $\\angle A$ 编一个度数进行计算。", isCorrect: false },
                    { text: "引入未知数，利用“设元法”将几何推导转化为代数运算。", isCorrect: true }
                ],
                explanation: "<strong>思维进阶：</strong> 在角度关系繁多且缺乏具体数值的图形中，“设元代数化”是降维打击的利器。通过设未知数，我们可以把抽象的逻辑推导，变成具体的代数式化简，极大地降低思考负担。"
            },
            {
                step: "第二步：精准“设元”，选择核心自变量",
                question: "既然决定使用“设元法”，要想解题顺畅，把图中哪个角设为未知数 $x$ 最“划算”（即能最快地顺藤摸瓜表示出其他的角）？为什么？",
                options: [
                    { text: "设 $\\angle CBE = x$，因为它在第一问的结论里。", isCorrect: false },
                    { text: "设 $\\angle A = x$ 或 $\\angle BCD = x$。", isCorrect: true },
                    { text: "设 $\\angle ABC = x$，因为它是底角，看起来更大。", isCorrect: false }
                ],
                explanation: "<strong>思维进阶：</strong> 设元要找“枢纽点”。因为已知 $\\angle BCD = \\angle A$，设它们其中一个为 $x$ 是等效的。又因为 $\\triangle ABC$ 是等腰三角形，且 $\\triangle ABE$ 是直角三角形，由 $\\angle A$ 出发，可以瞬间向外扩散，表示出各大主体角。"
            },
            {
                step: "第三步：搭建桥梁，寻找代数式中的“常数”",
                question: "确定了设 $\\angle A = x$ 后，我们要如何构建包含 $x$ 并且有特殊数值的代数式？在这个具体的图形中，这些“特殊的数值常量”主要来源于哪些已知的几何性质？",
                options: [
                    { text: "依赖肉眼估算，或者自己假设几个特殊角度去凑数。", isCorrect: false },
                    { text: "利用 $BE \\perp AC$ 产生的 $90^\\circ$，以及三角形内角和的 $180^\\circ$。", isCorrect: true },
                    { text: "通过寻找对顶角相等或同位角相等来获取特殊数值。", isCorrect: false }
                ],
                explanation: "<strong>思维进阶：</strong> 设元只是第一步，要把几何关系转化为代数式，还需要“常量”作为桥梁。垂直条件（$90^\\circ$）和三角形内角和定理（$180^\\circ$）是我们构建代数式最可靠的数值素材来源。找到这些常数，代数翻译就有了落脚点。"
            },
            {
                step: "第四步：代数翻译，顺手解决第一问",
                question: "好，我们设 $\\angle A = \\angle BCD = x$。现在开启“翻译模式”：结合刚刚找到的 $90^\\circ$ 和 $180^\\circ$，根据 $AB=AC$ 和 $BE \\perp AC$，你能用含 $x$ 的代数式推导并表示出 $\\angle CBE$ 吗？",
                options: [
                    { text: "$\\angle CBE = 90^\\circ - x$", isCorrect: false },
                    { text: "$\\angle CBE = \\frac{1}{2}x$", isCorrect: true },
                    { text: "$\\angle CBE = 90^\\circ - \\frac{1}{2}x$", isCorrect: false }
                ],
                explanation: "<strong>思维进阶：</strong> 恭喜你，不知不觉中第一问已经证完了！<br>推导过程如下：<br>① 因为 $AB=AC$，所以 $\\angle ABC = \\frac{180^\\circ - \\angle A}{2} = 90^\\circ - \\frac{1}{2}x$；<br>② 因为 $BE \\perp AC$，所以 $\\angle ABE = 90^\\circ - \\angle A = 90^\\circ - x$；<br>③ 所以 $\\angle CBE = \\angle ABC - \\angle ABE = (90^\\circ - \\frac{1}{2}x) - (90^\\circ - x) = \\frac{1}{2}x$。<br>因为 $\\angle BCD = x$，显然就有 $\\angle BCD = 2\\angle CBE$。"
            },
            {
                step: "第五步：目标锁定，聚焦第二问",
                question: "第二问的主角变成了 $\\triangle BDF$。要利用“$\\triangle BDF$ 是等腰三角形”这个核心条件来列方程求角度，我们下一步必须要完成的任务是什么？",
                options: [
                    { text: "证明 $\\triangle BDF$ 相似于 $\\triangle ABC$。", isCorrect: false },
                    { text: "用含 $x$ 的代数式，把 $\\triangle BDF$ 的三个内角都表达出来。", isCorrect: true },
                    { text: "找出 $\\triangle BDF$ 中哪两条边相等。", isCorrect: false }
                ],
                explanation: "<strong>思维进阶：</strong> “等腰”在计算题中意味着“等角”。只要我们能用含 $x$ 的代数式表示出 $\\triangle BDF$ 的三个内角（$\\angle DBF, \\angle BDF, \\angle DFB$），我们就可以利用“等角对等角”列出方程，从而求出 $x$。"
            },
            {
                step: "第六步：信息拼图，触发分类机制",
                question: "利用之前的成果和三角形内角和定理，我们可以算出 $\\triangle BDF$ 的三个内角分别是：<br>$\\angle DBF = 90^\\circ - x$<br>$\\angle BDF = 90^\\circ - \\frac{1}{2}x$<br>$\\angle DFB = \\frac{3}{2}x$<br>既然不知道哪两个角相等，列方程时我们需要分几种情况讨论？",
                options: [
                    { text: "1种情况（随便挑两个角相等就行）。", isCorrect: false },
                    { text: "2种情况。", isCorrect: false },
                    { text: "3种情况（两两组合组合）。", isCorrect: true }
                ],
                explanation: "<strong>思维进阶：</strong> 数学严谨性就体现在这里！无指定等腰时，必须考虑全部情况，不重不漏。<br>情况①：$\\angle DBF = \\angle BDF \\implies 90^\\circ - x = 90^\\circ - \\frac{1}{2}x \\implies x = 0$（显然舍去）<br>情况②：$\\angle DBF = \\angle DFB \\implies 90^\\circ - x = \\frac{3}{2}x \\implies x = 36^\\circ$<br>情况③：$\\angle BDF = \\angle DFB \\implies 90^\\circ - \\frac{1}{2}x = \\frac{3}{2}x \\implies x = 45^\\circ$"
            },
            {
                step: "第七步：严谨检验，收网定音",
                question: "我们算出了 $x = 36^\\circ$ 和 $x = 45^\\circ$ 两个非零答案。这两个答案可以直接写在答题卡上吗？还需要注意什么隐藏陷阱？",
                options: [
                    { text: "可以直接写，只要方程解出来是对的就行。", isCorrect: false },
                    { text: "需要结合“点 $D$ 在边 $AB$ 上”这个条件进行现实检验。", isCorrect: true }
                ],
                explanation: "<strong>思维进阶：</strong> 行百里者半九十，最后一步检验是区分学霸和普通学生的关键！<br>题目说“点 $D$ 是边 $AB$ 上一点”，这意味着射线 $CD$ 在 $\\angle ACB$ 内部，所以必然要有 $\\angle BCD < \\angle ACB$。<br>翻译成代数式就是：$x < 90^\\circ - \\frac{1}{2}x$，即 $\\frac{3}{2}x < 90^\\circ$，也就是 $x < 60^\\circ$。<br>我们求出的 $36^\\circ$ 和 $45^\\circ$ 都小于 $60^\\circ$，所以这两个答案都是合法且正确的！<br>最终答案：$\\angle A$ 的度数为 $36^\\circ$ 或 $45^\\circ$。"
            }
        ];

        let currentStep = 0;

        const renderQuestion = () => {
            const container = document.getElementById('question-area');
            const data = quizData[currentStep];

            // Shuffle options in place to randomize choices order
            data.options.sort(() => Math.random() - 0.5);

            // Update progress bar
            const progress = ((currentStep + 1) / quizData.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;

            let optionsHtml = '';
            data.options.forEach((opt, index) => {
                optionsHtml += `
                    <button onclick="handleAnswer(${index}, ${opt.isCorrect})" 
                            id="opt-${index}"
                            class="option-btn w-full text-left p-4 rounded-xl border-2 border-gray-100 bg-gray-50 text-gray-700 font-medium hover:bg-white focus:outline-none mb-3">
                        ${String.fromCharCode(65 + index)}. ${opt.text}
                    </button>
                `;
            });

            container.innerHTML = `
                <div class="fade-in space-y-6">
                    <div>
                        <span class="text-xs md:text-sm font-bold text-blue-600 tracking-wider uppercase">${data.step}</span>
                        <h3 class="text-base md:text-xl font-bold text-gray-900 mt-2 leading-relaxed">${data.question}</h3>
                    </div>
                    <div class="space-y-3" id="options-container">
                        ${optionsHtml}
                    </div>
                    <div id="explanation-box" class="rounded-xl bg-gray-50 border border-gray-100 p-5 mt-6 transition-all duration-300">
                        <div class="flex items-start">
                            <div class="flex-shrink-0 mt-0.5">
                                <svg class="h-5 w-5 text-gray-400 transition-colors duration-300" id="explanation-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                                  <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
                                </svg>
                            </div>
                            <div class="ml-3 text-sm text-gray-500 leading-relaxed transition-colors duration-300 flex-1 min-w-0" id="explanation-content">
                                请在上方选择一个选项以查看解题策略解析。
                            </div>
                        </div>
                    </div>
                    <div id="next-btn-container" class="mt-8 text-right">
                        <button onclick="nextStep()" id="next-btn" disabled class="inline-flex items-center px-6 py-3 border border-transparent text-base font-medium rounded-lg shadow-sm text-white bg-gray-300 cursor-not-allowed focus:outline-none transition-colors duration-300">
                            ${currentStep === quizData.length - 1 ? '完成训练' : '进入下一步策略'} 
                            <svg class="ml-2 -mr-1 h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                              <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                            </svg>
                        </button>
                    </div>
                </div>
            `;

            // Trigger MathJax render for dynamically added content
            if (window.MathJax && window.MathJax.typesetPromise) {
                MathJax.typesetPromise([container]);
            }
        };

        const handleAnswer = (selectedIndex, isCorrect) => {
            const data = quizData[currentStep];

            // Disable all buttons
            data.options.forEach((_, idx) => {
                const btn = document.getElementById(`opt-${idx}`);
                btn.disabled = true;
                btn.classList.add('cursor-not-allowed');

                // Highlight correct and wrong answers
                if (data.options[idx].isCorrect) {
                    btn.classList.add('correct-ans');
                } else if (idx === selectedIndex && !isCorrect) {
                    btn.classList.add('wrong-ans');
                } else {
                    btn.classList.add('opacity-50');
                }
            });

            // Update explanation text and button active state
            const expBox = document.getElementById('explanation-box');
            const expContent = document.getElementById('explanation-content');
            const expIcon = document.getElementById('explanation-icon');
            const nextBtn = document.getElementById('next-btn');

            if (expContent) {
                expContent.innerHTML = data.explanation;
                expContent.classList.remove('text-gray-500');
                expContent.classList.add('text-blue-900');
            }

            if (expBox) {
                expBox.classList.remove('bg-gray-50', 'border-gray-100');
                expBox.classList.add('bg-blue-50', 'border-blue-100');
            }

            if (expIcon) {
                expIcon.classList.remove('text-gray-400');
                expIcon.classList.add('text-blue-500');
            }

            if (nextBtn) {
                nextBtn.disabled = false;
                nextBtn.classList.remove('bg-gray-300', 'cursor-not-allowed');
                nextBtn.classList.add('bg-blue-600', 'hover:bg-blue-700', 'cursor-pointer');
            }

            // Trigger MathJax for explanation box just in case
            if (window.MathJax && window.MathJax.typesetPromise) {
                MathJax.typesetPromise([expBox]);
            }

            // Scroll container to the top of the viewport in mobile view
            if (window.innerWidth < 768) {
                const quizContainer = document.getElementById('quiz-container');
                if (quizContainer) {
                    const rect = quizContainer.getBoundingClientRect();
                    if (Math.abs(rect.top) > 5) {
                        quizContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                }
            }
        };

        const nextStep = () => {
            if (currentStep < quizData.length - 1) {
                currentStep++;
                renderQuestion();
            } else {
                showSortingChallenge();
            }
        };

        // --- 新增：排序挑战逻辑 ---
        const strategySteps = [
            { id: 1, text: "设元代数化" },
            { id: 2, text: "目标表达式推导" },
            { id: 3, text: "分类讨论建构方程" },
            { id: 4, text: "检验界限限制" }
        ];
        let availableSteps = [];
        let selectedSteps = [];

        const showSortingChallenge = () => {
            // 打乱待选步骤的顺序
            availableSteps = [...strategySteps].sort(() => Math.random() - 0.5);
            selectedSteps = [];
            renderSortingUI(true);
        };

        const renderSortingUI = (isInitial = false, errorMsg = "") => {
            const container = document.getElementById('question-area');

            // 进度条拉满
            document.getElementById('progress-bar').style.width = '100%';

            let selectedHtml = selectedSteps.length === 0 ?
                `<p class="text-gray-400 text-sm italic py-4 text-center">请从下方依次点击选择步骤...</p>` : '';

            selectedSteps.forEach((step, idx) => {
                selectedHtml += `
                    <div onclick="unselectStep(${idx})" class="cursor-pointer bg-blue-100 text-blue-800 border border-blue-200 px-4 py-3 rounded-lg shadow-sm font-medium flex items-center justify-between mb-2 hover:bg-blue-200 transition-colors">
                        <span>${idx + 1}. ${step.text}</span>
                        <span class="text-blue-500 text-sm bg-white w-6 h-6 flex items-center justify-center rounded-full hover:bg-blue-50 transition-colors font-bold">&times;</span>
                    </div>`;
            });

            let availableHtml = '';
            availableSteps.forEach((step, idx) => {
                availableHtml += `
                    <button onclick="selectStep(${idx})" class="w-full bg-white border-2 border-gray-200 text-gray-700 px-4 py-3 rounded-lg shadow-sm font-medium hover:border-indigo-400 hover:text-indigo-600 transition-colors mb-2 text-left flex justify-between items-center">
                        <span>${step.text}</span>
                        <span class="text-gray-400 text-xl font-light">+</span>
                    </button>`;
            });

            if (isInitial) {
                container.innerHTML = `
                    <div class="fade-in space-y-6">
                        <div class="text-center">
                            <span class="text-xs md:text-sm font-bold text-indigo-600 tracking-wider uppercase">终极挑战：梳理思维闭环</span>
                            <h3 class="text-base md:text-xl font-bold text-gray-900 mt-2">请按正确的逻辑顺序，依次点击排列以下的解题策略：</h3>
                        </div>
                        
                        <div class="bg-gray-50 p-4 rounded-xl border-2 border-dashed border-gray-300 min-h-[120px] transition-colors" id="selected-area-container">
                            <h4 class="text-sm font-semibold text-gray-500 mb-3">你的排序结果：</h4>
                            <div id="selected-area-content">${selectedHtml}</div>
                        </div>

                        <div id="error-message-container" class="empty:hidden"></div>

                        <div class="pt-2">
                            <h4 class="text-sm font-semibold text-gray-500 mb-3">待选步骤（点击选取）：</h4>
                            <div id="available-area-content">${availableHtml}</div>
                        </div>
                    </div>
                `;
            } else {
                const selectedContainer = document.getElementById('selected-area-container');
                const selectedContent = document.getElementById('selected-area-content');
                const availableContent = document.getElementById('available-area-content');
                const errorContainer = document.getElementById('error-message-container');

                if (selectedContainer) {
                    if (errorMsg) {
                        selectedContainer.className = "bg-gray-50 p-4 rounded-xl border-2 border-dashed border-red-400 bg-red-50 min-h-[120px] transition-colors";
                    } else {
                        selectedContainer.className = "bg-gray-50 p-4 rounded-xl border-2 border-dashed border-gray-300 min-h-[120px] transition-colors";
                    }
                }
                if (selectedContent) {
                    selectedContent.innerHTML = selectedHtml;
                }
                if (availableContent) {
                    availableContent.innerHTML = availableHtml;
                }
                if (errorContainer) {
                    errorContainer.innerHTML = errorMsg ? `<div class="text-red-500 text-sm font-medium text-center animate-pulse">${errorMsg}</div>` : '';
                }
            }
        };

        const selectStep = (idx) => {
            selectedSteps.push(availableSteps[idx]);
            availableSteps.splice(idx, 1);

            // 当4个全选完时，自动校验对错
            if (availableSteps.length === 0) {
                checkSorting();
            } else {
                renderSortingUI(false);
            }
        };

        const unselectStep = (idx) => {
            availableSteps.push(selectedSteps[idx]);
            selectedSteps.splice(idx, 1);
            renderSortingUI(false);
        };

        const checkSorting = () => {
            // 检查选中项的 id 是否按 1, 2, 3, 4 排列
            const isCorrect = selectedSteps.every((step, idx) => step.id === idx + 1);
            if (isCorrect) {
                showFinalSuccess();
            } else {
                renderSortingUI(false, "顺序不正确哦，请点击上方列表中的项目撤销后重新尝试！");
            }
        };

        const showFinalSuccess = () => {
            const container = document.getElementById('question-area');
            container.innerHTML = `
                <div class="text-center fade-in py-8">
                    <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-100 mb-6">
                        <svg class="h-10 w-10 text-green-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                        </svg>
                    </div>
                    <h2 class="text-3xl font-extrabold text-gray-900 mb-4">策略训练完成！</h2>
                    <p class="text-lg text-gray-600 mb-8 max-w-xl mx-auto">
                        太棒了！你完美梳理了这套几何题的高阶思维组合拳：<br><br>
                        <strong class="text-blue-700 bg-blue-50 px-4 py-3 rounded-xl inline-block my-2 border border-blue-100 shadow-sm text-base">
                            设元代数化 $\\rightarrow$ 目标表达式推导 $\\rightarrow$ 分类讨论建构方程 $\\rightarrow$ 检验界限限制
                        </strong><br><br>
                        以后遇到复杂条件，不要慌，试着像今天这样梳理策略！
                    </p>
                    <button onclick="location.reload()" class="inline-flex items-center px-6 py-3 border border-transparent text-base font-medium rounded-lg shadow-sm text-blue-700 bg-blue-100 hover:bg-blue-200 focus:outline-none transition-colors">
                        重新体验一遍
                    </button>
                </div>
            `;
            if (window.MathJax && window.MathJax.typesetPromise) {
                MathJax.typesetPromise([container]);
            }
        };

        // Initialize
        document.addEventListener("DOMContentLoaded", () => {
            // Initial Mathjax setup happens via script config
            setTimeout(() => {
                if (window.MathJax && window.MathJax.typesetPromise) {
                    MathJax.typesetPromise().then(() => {
                        renderQuestion();
                    });
                } else {
                    renderQuestion(); // fallback
                }
            }, 500); // Small delay to ensure MathJax is ready
        });
    </script>
</body>

</html>
